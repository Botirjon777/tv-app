name: hotel-menu CI

on:
  push:
    branches: [develop, main]
    paths:
      - "hotel-menu/**"
      - ".github/workflows/hotel-menu-ci.yml"
  pull_request:
    branches: [develop, main]
    paths:
      - "hotel-menu/**"
      - ".github/workflows/hotel-menu-ci.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: hotel-menu-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hotel-menu

    env:
      # Ephemeral CI database — a single-node replica set (Prisma's MongoDB
      # connector requires a replica set). Never touches the real Atlas data.
      MONGODB_URL: "mongodb://localhost:27017/hotel_menu_ci?replicaSet=rs0"
      # Dummy secrets so a production build never trips the fail-fast guards.
      AUTH_SECRET: "ci-only-secret-not-used-in-production"
      ADMIN_PASSWORD: "ci-admin"
      POS_PASSWORD: "ci-pos"
      NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: hotel-menu/package-lock.json

      - name: Start MongoDB (replica set)
        uses: supercharge/mongodb-github-action@1.11.0
        with:
          mongodb-version: "7.0"
          mongodb-replica-set: rs0

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Push schema to MongoDB
        run: npx prisma db push

      - name: Seed database
        run: npx prisma db seed

      - name: Build
        run: npm run build
